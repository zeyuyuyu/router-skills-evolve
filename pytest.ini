[pytest]
# Keep collection out of external clones, vendored code, run artifacts, and
# data dirs. The historical `pytest` pollution was collection wandering into an
# untracked `UncommonRoute/` checkout and dying on `import uncommon_route`.
norecursedirs =
    UncommonRoute
    .git
    __pycache__
    *.egg-info
    venv
    .venv
    env
    node_modules
    auto_research/runs
    results
    data
    experiments/tau2_stage2/code/vendor
addopts = -p no:cacheprovider
