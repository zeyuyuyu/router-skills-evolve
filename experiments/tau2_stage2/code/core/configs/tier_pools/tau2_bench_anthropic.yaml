# Tier pool for τ²-bench — Anthropic-SOTA-baseline variant (added 2026-05-04).
#
# Differs from tau2_bench.yaml only in the baseline assignment: the new "high"
# tier (Anthropic Claude Opus 4.7) IS the baseline, and probes escalate
# low → mid → mid-high. The old Qwen 397B mid-high model is now a candidate
# for step-replacement, not the baseline.
#
# tau2_bench.yaml (Qwen-baseline) is left untouched so the existing
# data_unified/ Qwen collection still reprices cleanly.
tiers:
  high:
    - anthropic/claude-opus-4-7         # also the baseline
  mid-high:
    - qwen/qwen3.5-397b-a17b            # former baseline, now a search candidate
  mid:
    - minimax/minimax-m2.7
    - qwen/qwen3-coder-480b-a35b-instruct
  low:
    - deepseek/deepseek-v3.2
    - zai-org/glm-4.5-air

search_tiers: [low, mid, mid-high]

baseline_model: anthropic/claude-opus-4-7
baseline_tier: high
analyzer_model: anthropic/claude-opus-4-7  # unused under probe-all; kept for schema

# Pinned τ² user simulator. Same as tau2_bench.yaml.
simulator:
  model: openai/gpt-5.2

# Pinned τ² repo. Identical to tau2_bench.yaml — same upstream pin, same SHA.
benchmark_repo:
  url: git@github.com:tonyyunyang/tau2-bench-evol-llm.git
  upstream: git@github.com:sierra-research/tau2-bench.git
  tag: v1.0.0
  sha: 17e07b1da2bbc0cadfddeea36412686e0604127b

# Per-provider overrides. OpenRouter slug for Opus 4.7 includes a date suffix
# (anthropic/claude-4.7-opus-20260416); the rest mirror tau2_bench.yaml.
# Provider tag for Opus 4.7 is "anthropic" (direct from Anthropic, not via
# Bedrock or Vertex) — verified 2026-05-04 against
# /api/v1/models/anthropic/claude-4.7-opus-20260416/endpoints.
provider_overrides:
  openrouter:
    anthropic/claude-opus-4-7:
      id: anthropic/claude-4.7-opus-20260416
      provider: anthropic
    qwen/qwen3.5-397b-a17b:
      id: qwen/qwen3.5-397b-a17b
      provider: alibaba
    minimax/minimax-m2.7:
      id: minimax/minimax-m2.7
      provider: fireworks
    qwen/qwen3-coder-480b-a35b-instruct:
      id: qwen/qwen3-coder
      provider: wandb/bf16
    deepseek/deepseek-v3.2:
      id: deepseek/deepseek-v3.2
      provider: novita/fp8
    zai-org/glm-4.5-air:
      id: z-ai/glm-4.5-air
      provider: novita/bf16
    openai/gpt-5.2:
      id: openai/gpt-5.2
      provider: openai
