# USD per 1M tokens. Two parallel cost tracks (PROJECT_CHARTER.md §3.2 / §3.11):
#
#   models:             API-derived per-model rates → drives `actual_usd`.
#                       Pulled from GET https://api.commonstack.ai/v1/models
#                       (sampled 2026-04-26). Cache fields are 0 when the API
#                       doesn't list them — we don't fabricate rates.
#
#   fixed_tier_prices:  Tier-uniform rates set by the pillar owner → drives
#                       the Exp-1 `fixed_tier_usd` comparison metric.

models:
  # ---------------- active tier pool (2026-04-26) ----------------
  anthropic/claude-opus-4-7:            # high / Anthropic-baseline (added 2026-05-04)
    input_usd_per_m: 5.00               # OR-published rate, queried 2026-05-04
    output_usd_per_m: 25.00
    cache_read_usd_per_m: 0.50
    cache_write_usd_per_m: 6.25
  qwen/qwen3.5-397b-a17b:               # mid-high / Qwen-baseline
    input_usd_per_m: 0.60
    output_usd_per_m: 3.60
    cache_read_usd_per_m: 0.0           # not reported by API
    cache_write_usd_per_m: 0.0          # not reported by API
  minimax/minimax-m2.7:                 # mid
    input_usd_per_m: 0.30
    output_usd_per_m: 1.20
    cache_read_usd_per_m: 0.06
    cache_write_usd_per_m: 0.0          # not reported by API
  qwen/qwen3-coder-480b-a35b-instruct:  # mid
    input_usd_per_m: 0.33
    output_usd_per_m: 1.65
    cache_read_usd_per_m: 0.0           # not reported by API
    cache_write_usd_per_m: 0.0          # not reported by API
  deepseek/deepseek-v3.2:               # low
    input_usd_per_m: 0.269
    output_usd_per_m: 0.40
    cache_read_usd_per_m: 0.1345
    cache_write_usd_per_m: 0.0          # not reported by API
  zai-org/glm-4.5-air:                  # low
    input_usd_per_m: 0.13
    output_usd_per_m: 0.85
    cache_read_usd_per_m: 0.025
    cache_write_usd_per_m: 0.0          # not reported by API
  openai/gpt-5.2:                       # τ² user simulator — kept at 0 because
    input_usd_per_m: 0.0                # simulator cost flows in via tau2's
    output_usd_per_m: 0.0               # sim object, not via pricing.yaml.
    cache_read_usd_per_m: 0.0
    cache_write_usd_per_m: 0.0
  local/student:                      # trained Qwen student via local vLLM
    input_usd_per_m: 0.0              # self-hosted, zero per-token cost
    output_usd_per_m: 0.0
    cache_read_usd_per_m: 0.0
    cache_write_usd_per_m: 0.0

  # ---------------- legacy (retained so historical data/ reprices cleanly) ----------------
  anthropic/claude-opus-4-6:
    input_usd_per_m: 5.00
    output_usd_per_m: 25.00
    cache_read_usd_per_m: 0.50
    cache_write_usd_per_m: 6.25
  anthropic/claude-sonnet-4-5:
    input_usd_per_m: 3.00
    output_usd_per_m: 15.00
    cache_read_usd_per_m: 0.30
    cache_write_usd_per_m: 3.75
  zai-org/glm-5:
    input_usd_per_m: 1.00
    output_usd_per_m: 3.20
    cache_read_usd_per_m: 0.20
    cache_write_usd_per_m: 1.00         # assume = input (not in catalog)
  minimax/minimax-m2.5:
    input_usd_per_m: 0.30
    output_usd_per_m: 1.20
    cache_read_usd_per_m: 0.03
    cache_write_usd_per_m: 0.30         # assume = input
  openai/gpt-4.1:
    input_usd_per_m: 2.00
    output_usd_per_m: 8.00
    cache_read_usd_per_m: 0.50
    cache_write_usd_per_m: 2.00

# Tier-uniform "fixed" rates the pillar owner pinned for Exp-1 reporting.
# Every step in the tier is priced at these rates regardless of which specific
# CommonStack model handled it.
fixed_tier_prices:                      # PROJECT_CHARTER.md §3.11
  low:
    input_usd_per_m: 0.26
    output_usd_per_m: 0.50
    cache_read_usd_per_m: 0.13
    cache_write_usd_per_m: 0.26
  mid:
    input_usd_per_m: 0.30
    output_usd_per_m: 2.00
    cache_read_usd_per_m: 0.059
    cache_write_usd_per_m: 0.30
  mid-high:
    input_usd_per_m: 0.50
    output_usd_per_m: 5.00
    cache_read_usd_per_m: 0.05
    cache_write_usd_per_m: 0.0833
  high:                                 # legacy — for repricing pre-2026-04-24 (Opus-baseline) data
    input_usd_per_m: 5.00
    output_usd_per_m: 25.00
    cache_read_usd_per_m: 0.50
    cache_write_usd_per_m: 6.25

# OpenRouter rates for the same models, queried 2026-05-01 from
# https://openrouter.ai/api/v1/models/<id>/endpoints. KEYS USE THE
# OPENROUTER MODEL ID, NOT THE CANONICAL CS ID — cost accounting looks
# up by what was actually sent to the API, which after _resolve_model
# is the OR id. See docs/superpowers/specs/2026-05-01-openrouter-provider-design.md.
provider_overrides:
  openrouter:
    anthropic/claude-opus-4-7:           # OR slug differs from CS canonical id
      input_usd_per_m: 5.00              # OR-published rate, queried 2026-05-04
      output_usd_per_m: 25.00            # via /api/v1/models/anthropic/claude-4.7-opus-20260416/endpoints
      cache_read_usd_per_m: 0.50
      cache_write_usd_per_m: 6.25
    qwen/qwen3.5-397b-a17b:
      input_usd_per_m: 0.39
      output_usd_per_m: 2.34
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
    minimax/minimax-m2.7:
      input_usd_per_m: 0.30
      output_usd_per_m: 1.20
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
    qwen/qwen3-coder:                # OR slug, NOT qwen/qwen3-coder-480b-a35b-instruct
      input_usd_per_m: 1.00
      output_usd_per_m: 1.50
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
    deepseek/deepseek-v3.2:
      input_usd_per_m: 0.269
      output_usd_per_m: 0.40
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
    z-ai/glm-4.5-air:                # OR slug, NOT zai-org/glm-4.5-air
      input_usd_per_m: 0.13
      output_usd_per_m: 0.85
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
    openai/gpt-5.2:
      input_usd_per_m: 0.0          # tau2 sim cost flows externally; keep convention
      output_usd_per_m: 0.0
      cache_read_usd_per_m: 0.0
      cache_write_usd_per_m: 0.0
