run_id: smoke_2b
model:
  name: Qwen/Qwen2.5-0.5B-Instruct           # tiny model for CPU smoke
  revision: 7ae557604adf67be50417f59c2c2f167def9a775
  is_moe: false
data:
  n_train_runs: 273
training:
  output_dir: train_outputs/_smoke
  num_train_epochs: 1
  max_steps: 1                                # single optimizer step
  learning_rate: 3.0e-5
  warmup_steps: 0.05    # float<1 = ratio (TRL/transformers 5.x)
  lr_scheduler_type: constant                 # cosine isn't meaningful for 1 step
  cosine_min_lr_ratio: 0.10
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  per_device_eval_batch_size: 1
  bf16: false                                 # CPU doesn't support bf16
  fp16: false
  gradient_checkpointing: false
  torch_compile: false
  max_seq_length: 1024                        # tight for CPU + 0.5B
  packing: false                              # packing requires FA2; eager skips
  packing_strategy: bfd
  padding_free: false                         # ditto
  attn_implementation: eager                  # CPU-safe
  completion_only_loss: true
  assistant_only_loss: false
  use_liger_kernel: false
  loss_type: nll                              # chunked_nll requires FA2; nll is the standard fallback
  dataloader_num_workers: 0                   # CPU smoke: deterministic
  eval_strategy: "no"
  eval_steps: 50
  save_strategy: "no"
  save_total_limit: 1
  load_best_model_at_end: false
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 1
  logging_steps: 1
  seed: 1234
  data_seed: 42
distributed:
  strategy: ddp
  accelerate_config: configs/accelerate_ddp.yaml
moe: null
