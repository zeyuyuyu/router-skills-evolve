compute_environment: LOCAL_MACHINE
distributed_type: FSDP
mixed_precision: bf16
num_machines: 1
num_processes: 8       # 8x H200
machine_rank: 0
main_training_function: main
fsdp_config:
  fsdp_version: 2
  # FULL_STATE_DICT makes trainer.save_model() produce a normal HF checkpoint
  # usable by vLLM/eval. FSDP run YAMLs set save_only_model=true so periodic
  # checkpoints do not also dump optimizer state.
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  # Qwen3.6-35B-A3B MoE layers are too large to all-gather as whole decoder
  # blocks on 8x H200. Wrap the heavy child modules separately so peak FSDP2
  # all-gather memory stays below device capacity.
  fsdp_transformer_layer_cls_to_wrap: Qwen3_5MoeAttention,Qwen3_5MoeGatedDeltaNet,Qwen3_5MoeExperts,Qwen3_5MoeMLP,Qwen3_5MoeSparseMoeBlock,Qwen3_5MoeDecoderLayer
  fsdp_cpu_ram_efficient_loading: true
  fsdp_offload_params: false
  fsdp_reshard_after_forward: true        # run08 needs immediate reshard to avoid MoE all-gather OOM
  fsdp_activation_checkpointing: true
